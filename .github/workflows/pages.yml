name: Build and publish blog

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  # 工作流需要写入发布分支，因此需要 contents: write。
  contents: write

concurrency:
  group: blog-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build with Jekyll
        env:
          # production 会启用站点生产环境行为，例如评论、统计等生产环境开关。
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace --baseurl "/blog"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # 使用 GitHub 自动生成的 token 把 _site 目录提交到当前仓库的 gh-pages 分支。
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          # 每次发布生成一个干净的 gh-pages 分支历史，避免旧构建产物残留。
          force_orphan: true
