name: Build and publish blog

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  # 只需要读取当前源码仓库；跨仓库写入依赖下面的 BLOG_DEPLOY_TOKEN。
  contents: read

concurrency:
  group: blog-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build with Jekyll
        env:
          # production 会启用站点生产环境行为，例如评论、统计等生产环境开关。
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace --baseurl "/blog"

      - name: Checkout GitHub Pages repository
        uses: actions/checkout@v4
        with:
          # 目标发布仓库。GitHub Pages 会从这个仓库的 main 分支发布根站点。
          repository: NiuSX/NiuSX.github.io
          ref: main
          path: github-pages
          # 需要在当前源码仓库 Settings -> Secrets and variables -> Actions 中配置。
          token: ${{ secrets.BLOG_DEPLOY_TOKEN }}

      - name: Copy site into /blog
        shell: bash
        run: |
          rm -rf github-pages/blog
          mkdir -p github-pages/blog
          cp -a _site/. github-pages/blog/
          touch github-pages/blog/.nojekyll

      - name: Commit and push published site
        shell: bash
        working-directory: github-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog
          if git diff --cached --quiet; then
            echo "No blog changes to publish."
            exit 0
          fi
          git commit -m "Publish blog from minmistake_personal_blog"
          git push origin main
